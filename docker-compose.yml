services:
  init:
    profiles: ["init"]
    image: vscnetwork/go-vsc-node:main
    command: ./vsc-node --init
    environment:
      - MONGO_URL=mongodb://mongo:27017
    depends_on:
      - mongo
    networks:
      - go-vsc-node
    volumes:
      - ./data:/home/app/app/data
  go-vsc-node: # name of the service
    image: vscnetwork/go-vsc-node:main
    pull_policy: always
    container_name: go-vsc-node # what to label the container for docker ps
    restart: always # restart if failed, until we stop it ourselves
    # VD-L-BTCDHEALTH: gate startup on mongo AND btcd being healthy (both now
    # have healthchecks), so the node never boots against a not-ready DB or a
    # btcd that is still bringing up RPC.
    depends_on:
      mongo:
        condition: service_healthy
      btcd:
        condition: service_healthy
    networks:
      - go-vsc-node
    ports:
      # review7 VD-M3: bind the GraphQL API to loopback only. Publishing it on
      # 0.0.0.0 exposed the node's GQL (state/query surface) to the public
      # internet; front it with an authenticated reverse proxy if external
      # access is needed. The p2p ports below stay published — they must be
      # reachable by other validators.
      - 127.0.0.1:8080:8080
      - 10720:10720
      - 10720:10720/udp
    environment:
      - MONGO_URL=mongodb://mongo:27017
    volumes:
      - ./data:/home/app/app/data
    logging:
      driver: "json-file"
      options:
        max-file: "5"
        max-size: "10m"
    labels:
      - "com.centurylinklabs.watchtower.enable=${AUTO_UPDATE:-true}"
    deploy:
      resources:
        limits:
          memory: 2048M
  mongo:
    container_name: mongo_vsc
    image: mongo:8.0.17
    pull_policy: always
    restart: always
    ports:
      - 127.0.0.1:27021:27017
    networks:
      - go-vsc-node
    volumes:
      - ./data/vsc-db:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      retries: 5
      timeout: 5s
      # AF-2: now that go-vsc-node and init wait on `mongo: service_healthy`,
      # give mongod room for cold-boot journal replay before the gate trips.
      # Without this, a replay longer than interval*retries (~50s) would brick
      # cold boot.
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-file: "5"
        max-size: "5m"
    labels:
      - "com.centurylinklabs.watchtower.enable=${AUTO_UPDATE:-true}"
    deploy:
      resources:
        limits:
          memory: 1G

  # Watchtower automatically updates the containers
  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --label-enable --interval 3600 --cleanup
    environment:
      - DOCKER_API_VERSION=1.44
    restart: always

  btcd:
    image: bitcoin/bitcoin:29.3
    container_name: vsc-btcd
    command: -rpcuser=vsc-node-user -rpcpassword=vsc-node-pass -rpcallowip=0.0.0.0/0 -rpcbind=0.0.0.0 -prune=550 -dbcache=2048 -server=1 -listen=1
    restart: always
    # NOTE: the -rpcuser / -rpcpassword in the healthcheck below MUST stay in
    # sync with the -rpcuser / -rpcpassword in `command:` above (and in
    # multi-core-docker-compose.yml). If the BTC RPC credentials are rotated
    # (see CRIT-6 remediation), update ALL places in the same commit or the
    # healthcheck 401s and go-vsc-node never starts (it waits on
    # btcd: condition: service_healthy). getblockchaininfo responds during IBD,
    # so the gate passes on RPC-up — no deadlock while the chain syncs.
    healthcheck:
      test:
        - "CMD"
        - "bitcoin-cli"
        - "-rpcuser=vsc-node-user"
        - "-rpcpassword=vsc-node-pass"
        - "getblockchaininfo"
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    volumes:
      - ./.btc-data:/home/bitcoin/.bitcoin
    logging:
      driver: "json-file"
      options:
        max-file: "5"
        max-size: "10m"
    networks:
      - go-vsc-node
networks:
  go-vsc-node:
    driver: bridge
