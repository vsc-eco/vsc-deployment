services:
  init:
    profiles: ["init"]
    image: vscnetwork/go-vsc-node:main
    command: ./vsc-node --init
    environment:
      # VD-H1: authenticated MongoDB connection (see mongo service + .env.example).
      - MONGO_URL=mongodb://${MONGO_USER:-vsc_node}:${MONGO_PASSWORD:?set MONGO_PASSWORD in .env}@mongo:27017/?authSource=admin
    depends_on:
      - mongo
    networks:
      - go-vsc-node
    volumes:
      - ./data:/home/app/app/data
  go-vsc-node: # name of the service
    image: vscnetwork/go-vsc-node:main
    pull_policy: always
    container_name: go-vsc-node # what to label the container for docker ps
    restart: always # restart if failed, until we stop it ourselves
    depends_on:
      - mongo
      - btcd
    networks:
      - go-vsc-node
    ports:
      - 8080:8080
      - 10720:10720
      - 10720:10720/udp
    environment:
      # VD-H1: authenticated MongoDB connection (see mongo service + .env.example).
      - MONGO_URL=mongodb://${MONGO_USER:-vsc_node}:${MONGO_PASSWORD:?set MONGO_PASSWORD in .env}@mongo:27017/?authSource=admin
    volumes:
      - ./data:/home/app/app/data
    logging:
      driver: "json-file"
      options:
        max-file: "5"
        max-size: "10m"
    labels:
      - "com.centurylinklabs.watchtower.enable=${AUTO_UPDATE:-true}"
    deploy:
      resources:
        limits:
          memory: 2048M
  mongo:
    container_name: mongo_vsc
    image: mongo:8.0.17
    pull_policy: always
    restart: always
    # VD-H1: enable authentication. Setting these on the official image both
    # creates the root user (on first init of an EMPTY data dir) and turns on
    # --auth, so the instance is no longer open to anyone who can reach it.
    # NOTE: these only initialise a FRESH ./data/vsc-db; an existing un-authed
    # volume must have the user created manually (see README) before auth works.
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER:-vsc_node}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD:?set MONGO_PASSWORD in .env}
    ports:
      - 127.0.0.1:27021:27017
    networks:
      - go-vsc-node
    volumes:
      - ./data/vsc-db:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      retries: 5
      timeout: 5s
    logging:
      driver: "json-file"
      options:
        max-file: "5"
        max-size: "5m"
    labels:
      - "com.centurylinklabs.watchtower.enable=${AUTO_UPDATE:-true}"
    deploy:
      resources:
        limits:
          memory: 1G

  # Watchtower automatically updates the containers
  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --label-enable --interval 3600 --cleanup
    environment:
      - DOCKER_API_VERSION=1.44
    restart: always

  btcd:
    image: bitcoin/bitcoin:29.3
    container_name: vsc-btcd
    command: -rpcuser=vsc-node-user -rpcpassword=vsc-node-pass -rpcallowip=0.0.0.0/0 -rpcbind=0.0.0.0 -prune=550 -dbcache=2048 -server=1 -listen=1
    restart: always
    volumes:
      - ./.btc-data:/home/bitcoin/.bitcoin
    logging:
      driver: "json-file"
      options:
        max-file: "5"
        max-size: "10m"
    networks:
      - go-vsc-node
networks:
  go-vsc-node:
    driver: bridge
